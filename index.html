<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZeroStars V4 Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="top-card">

<h1>⭐ ZeroStars</h1>

<div class="stats">

<div class="stat">
<p>💰 Stars</p>
<h2 id="coins">0</h2>
</div>

<div class="stat">
<p>🏆 Level</p>
<h2 id="level">1</h2>
</div>

</div>

</div>

<div class="panel">

<p>XP</p>

<div class="bar">
<div id="xpFill"></div>
</div>

<p id="xpText">
0 / 100
</p>

</div>

<div class="panel">

<p>⚡ Energy</p>

<div class="bar energy-bar">
<div id="energyFill"></div>
</div>

<p id="energyText">
100 / 100
</p>

</div>

<div id="star" class="star">
⭐
</div>

<div class="panel">

<button id="upgradeBtn">
⛏ Upgrade Power
</button>

<button id="minerBtn">
🤖 Buy Miner
</button>

<button id="dailyBtn">
🎁 Daily Reward
</button>

</div>

<div class="panel">

<h3>Player Stats</h3>

<p>
Power:
<span id="power">1</span>
</p>

<p>
Miners:
<span id="miners">0</span>
</p>

</div>

<div class="panel">

<h3>🏪 Shop</h3>

<button id="boostBtn">
🚀 XP Boost (500)
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
