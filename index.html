<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZeroStars V4 Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="top-card">

<h1>⭐ ZeroStars</h1>

<div class="stats">

<div class="stat">
<p>💰 Stars</p>
<h2 id="coins">0</h2>
</div>

<div class="stat">
<p>🏆 Level</p>
<h2 id="level">1</h2>
</div>

</div>

</div>

<div class="panel">

<p>XP</p>

<div class="bar">
<div id="xpFill"></div>
</div>

<p id="xpText">
0 / 100
</p>

</div>

<div class="panel">

<p>⚡ Energy</p>

<div class="bar energy-bar">
<div id="energyFill"></div>
</div>

<p id="energyText">
100 / 100
</p>

</div>

<div id="star" class="star">
⭐
</div>

<div class="panel">

<button id="upgradeBtn">
⛏ Upgrade Power
</button>

<button id="minerBtn">
🤖 Buy Miner
</button>

<button id="dailyBtn">
🎁 Daily Reward
</button>

</div>

<div class="panel">

<h3>Player Stats</h3>

<p>
Power:
<span id="power">1</span>
</p>

<p>
Miners:
<span id="miners">0</span>
</p>

</div>

<div class="panel">

<h3>🏪 Shop</h3>
<div class="panel">

<h3>🏆 Leaderboard</h3>

<div id="leaderboard">
Loading...
</div>

</div>
<button id="boostBtn">
🚀 XP Boost (500)
</button>

</div>

</div>
  <div class="panel">
<div class="panel">

<h3>📋 Tasks</h3>
<div>

📢 Join Telegram

<a href="https://t.me/zeroStarsuru" target="_blank">
<button>Join Telegram</button>
</a>

<button onclick="claimTelegramTask()">
Claim +500
</button>

</div>

<div>

🐦 Follow X

<a href="https://x.com/zerostartsuru?s=11" target="_blank">
<button>Follow X</button>
</a>

<button onclick="claimTwitterTask()">
Claim +500
</button>

</div>
<div id="tasks">

<div>
⭐ Reach 100 Stars
<button onclick="claimTask(1)">
Claim
</button>
</div>

<div>
🤖 Buy First Miner
<button onclick="claimTask(2)">
Claim
</button>
</div>

<div>
🏆 Reach Level 5
<button onclick="claimTask(3)">
Claim
</button>
</div>

</div>

</div>
<h3>🏆 Leaderboard</h3>

<div id="leaderboard">
Loading...
</div>

</div>
<script type="module" src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script type="module" src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
<script src="app.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
