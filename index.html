<!DOCTYPE html>
<html>
<head>
  <!-- CSS -->
</head>
<body>

  <!-- UI -->
  <div id="coins">0</div>
  <div id="energyFill"></div>
  <div id="energyText"></div>

  <!-- Upgrade Button -->
  <button id="upgradeBtn" onclick="upgradePickaxe()">
    ⛏ Upgrade (50)
  </button>

  <!-- Auto Miner -->
  <button id="autoBtn" onclick="buyAutoMiner()">
    🤖 Auto Miner (100)
  </button>

  <div id="autoCount">Auto Miners: 0</div>

  <!-- Leaderboard -->
  <div id="leaderboard"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>

  // Firebase Config
  const firebaseConfig = {
    apiKey: "...",
    authDomain: "...",
    projectId: "zerostars-97e21",
    storageBucket: "...",
    messagingSenderId: "617216289630",
    appId: "..."
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Variables
  let coins = 0;
  let energy = 100;
  let maxEnergy = 100;

  let clickPower = 1;
  let upgradeCost = 50;

  let autoMiner = 0;
  let autoMinerCost = 100;

  let username =
    localStorage.getItem("username") ||
    prompt("Enter Username");

  localStorage.setItem("username", username);

  // Functions

  function mine(e){
      if(energy <= 0) return;

      coins += clickPower;
      energy--;

      updateUI();
      createFloating(e, clickPower);

      saveScore();
  }

  function updateUI(){
      document.getElementById("coins").innerText = coins;

      let percent =
        (energy / maxEnergy) * 100;

      document.getElementById("energyFill").style.width =
        percent + "%";

      document.getElementById("energyText").innerText =
        energy + " / " + maxEnergy + " Energy";
  }

  function upgradePickaxe(){
      if(coins < upgradeCost) return;

      coins -= upgradeCost;
      clickPower++;

      upgradeCost =
        Math.floor(upgradeCost * 1.5);

      document.getElementById("upgradeBtn").innerText =
        "⛏ Upgrade (" + upgradeCost + ")";

      updateUI();
  }

  function buyAutoMiner(){
      if(coins < autoMinerCost) return;

      coins -= autoMinerCost;
      autoMiner++;

      autoMinerCost =
        Math.floor(autoMinerCost * 1.8);

      document.getElementById("autoBtn").innerText =
        "🤖 Auto Miner (" + autoMinerCost + ")";

      document.getElementById("autoCount").innerText =
        "Auto Miners: " + autoMiner;

      updateUI();
  }

  function createFloating(e, amount){
      let float =
        document.createElement("div");

      float.className = "floating";
      float.innerText = "+" + amount;

      float.style.left = e.clientX + "px";
      float.style.top = e.clientY + "px";

      document.body.appendChild(float);

      setTimeout(() => {
        float.remove();
      }, 1000);
  }

  async function saveScore(){
      await db.collection("leaderboard")
      .doc(username)
      .set({
          username,
          coins
      });
  }

  async function loadLeaderboard(){

      const snapshot =
        await db.collection("leaderboard")
        .orderBy("coins","desc")
        .limit(10)
        .get();

      let html = "<h3>🏆 Top Players</h3>";

      snapshot.forEach(doc => {
          const p = doc.data();

          html += `
            <div>
              ${p.username} - ${p.coins}
            </div>
          `;
      });

      document.getElementById(
        "leaderboard"
      ).innerHTML = html;
  }

  // Energy Regen
  setInterval(() => {

      if(energy < maxEnergy){
          energy++;
          updateUI();
      }

  },1000);

  // Auto Miner
  setInterval(() => {

      if(autoMiner > 0){

          coins += autoMiner;

          updateUI();
          saveScore();
      }

  },1000);

  // Refresh Leaderboard
  setInterval(loadLeaderboard,5000);

  updateUI();
  loadLeaderboard();

  </script>

</body>
</html>
