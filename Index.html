<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZeroStars v3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>⭐ ZeroStars v3</h1>

<div class="panel">

<h2 id="coins">0</h2>

<p>
Level:
<span id="level">1</span>
</p>

<p>
XP:
<span id="xp">0</span>
</p>

<div class="bar">
<div id="energyFill"></div>
</div>

<p id="energyText">
100 / 100 Energy
</p>

</div>

<div id="star" class="star">
⭐
</div>

<div class="panel">

<button id="upgradeBtn">
⛏ Upgrade
</button>

<button id="minerBtn">
🤖 Auto Miner
</button>

<button id="dailyBtn">
🎁 Daily Reward
</button>

</div>

<div class="panel">

<p>
Power:
<span id="power">1</span>
</p>

<p>
Miners:
<span id="miners">0</span>
</p>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
